@if (!setup) {
  <div class="setup-page d-flex align-items-center justify-content-center">
    <div class="setup-container">

      <h1 class="setup-site-title text-center mb-5 pb-4" style="view-transition-name: site-title">Resurrecting the Truth</h1>

      <div class="field field-1">
        <label class="setup-label">Topic</label>
        <input
          type="text"
          class="setup-input form-control form-control-lg"
          placeholder="e.g. Social media does more harm than good"
          [(ngModel)]="topic"
        />
      </div>

      <div class="field field-2">
        <div class="d-flex justify-content-between align-items-center">
          <label class="setup-label mb-0">Number of Turns</label>
          <div class="d-flex gap-3">
            @for (n of [3, 5, 7]; track n) {
              <button
                class="rounds-btn"
                [class.rounds-btn--active]="rounds === n"
                (click)="rounds = n"
              >{{ n }}</button>
            }
          </div>
        </div>
      </div>

      <div class="field field-3 text-center">
        <button
          class="btn btn-primary btn-lg setup-btn"
          [disabled]="!topic.trim()"
          (click)="start()"
        >Start Debate</button>
      </div>

    </div>
  </div>
} @else {
  <app-debate-arena (exit)="unsetup($event)" [topic]="topic" [max_rounds]="rounds"></app-debate-arena>
}
