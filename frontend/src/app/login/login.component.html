<div class="container">
    <div class="row">
        <h1 id="title">Login</h1>
    </div>
    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="row">
            <button type="button" class="btn btn-link" routerLink="../register">Register for an account</button>
        </div>
        <div class="row">
            <label for="username">Username: </label>
            <input id="username" type="text" [(ngModel)]="model.username" name="username" />
        </div>
        <div class="row">
            <label for="password">Password:</label>
            <input id="password" type="text" [(ngModel)]="model.password" name="password" />
        </div>
        <div class="row">
            <button type="submit" class="btn btn-success" [disabled]="!loginForm.form.valid">Submit</button>
        </div>
    </form>
</div>
